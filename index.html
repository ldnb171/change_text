<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool kéo dài chữ</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #74ebd5, #acb6e5);
    padding: 20px;
}

h2 { text-align: center; }

.container {
    max-width: 600px;
    margin: auto;
}

.box {
    background: white;
    padding: 18px;
    margin: 15px 0;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}

textarea {
    width: 100%;
    height: 90px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    resize: none;
}

.btn-group {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 25px;
    background: #6c5ce7;
    color: white;
    cursor: pointer;
}

.copy {
    background: #00b894;
}

.output {
    margin-top: 12px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>✨ Tool kéo dài chữ xịn xò</h2>

<div class="container">

<div class="box">
<textarea id="input1"></textarea>
<div class="btn-group">
<button onclick="convertText(1)">Chuyển đổi</button>
<button class="copy" onclick="copyText(1)">Copy</button>
</div>
<div id="output1" class="output"></div>
</div>

<div class="box">
<textarea id="input2"></textarea>
<div class="btn-group">
<button onclick="convertText(2)">Chuyển đổi</button>
<button class="copy" onclick="copyText(2)">Copy</button>
</div>
<div id="output2" class="output"></div>
</div>

<div class="box">
<textarea id="input3"></textarea>
<div class="btn-group">
<button onclick="convertText(3)">Chuyển đổi</button>
<button class="copy" onclick="copyText(3)">Copy</button>
</div>
<div id="output3" class="output"></div>
</div>

</div>

<script>
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function randomSuffix() {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let result = "";
    for (let i = 0; i < 4; i++) {
        result += chars[Math.floor(Math.random() * chars.length)];
    }
    return result;
}

function stretchWord(word) {
    if (!word) return word;

    let chars = word.split("");
    let index;
    let rand = Math.random();

    if (rand < 0.7) index = chars.length - 1;
    else if (rand < 0.9) index = 0;
    else index = randomInt(0, chars.length - 1);

    let repeat = randomInt(1, 3);
    chars[index] = chars[index].repeat(repeat + 1);

    return chars.join("");
}

function convertText(id) {
    let text = document.getElementById("input" + id).value.trim();
    if (!text) return;

    let words = text.split(" ");
    let total = words.length;

    let indexes = [];
    let used = [];

    // 🔥 luôn có ít nhất 1 từ
    let first = randomInt(0, total - 1);
    indexes.push(first);
    used.push(first);

    let probability = 0.5;

    while (Math.random() < probability && used.length < total) {
        let idx;
        do {
            idx = randomInt(0, total - 1);
        } while (used.includes(idx));

        indexes.push(idx);
        used.push(idx);

        probability /= 2; // giảm dần: 50% → 25% → 12.5%...
    }

    // apply kéo dài
    indexes.forEach(i => {
        words[i] = stretchWord(words[i]);
    });

    let result = words.join(" ") + " " + randomSuffix();
    document.getElementById("output" + id).innerText = result;
}

function copyText(id) {
    let text = document.getElementById("output" + id).innerText;
    if (!text) return;

    navigator.clipboard.writeText(text);
    alert("Đã copy!");
}
</script>

</body>
</html>
