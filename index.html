<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Change Text</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #acb6e5);
    padding: 20px;
}

h2 { text-align: center; }

.container {
    max-width: 600px;
    margin: auto;
}

.box {
    background: white;
    padding: 18px;
    margin: 15px 0;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

textarea {
    height: 90px;
    resize: none;
}

.btn-group {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 25px;
    background: #6c5ce7;
    color: white;
    cursor: pointer;
}

button:hover { opacity: 0.9; }

.copy { background: #00b894; }

.output {
    margin-top: 10px;
    font-weight: bold;
    word-break: break-word;
}

/* 🔥 TOAST */
#toast {
    position: fixed;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 10px 18px;
    border-radius: 25px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
}
</style>
</head>

<body>

<h2>✨ Tool Change Text</h2>

<div class="container">

<!-- RANDOM NUMBER -->
<div class="box">
<h3>🎲 Random số</h3>

<input type="number" id="count" placeholder="Số lượng số (vd: 9)">

<div class="row">
<input type="text" id="start" placeholder="Số bắt đầu (vd: 1)">
<input type="text" id="end" placeholder="Số kết thúc (vd: 0330)">
</div>

<div class="btn-group">
<button onclick="randomNumber()">Random</button>
<button class="copy" onclick="copyRandom()">Copy</button>
</div>

<div id="randomOutput" class="output"></div>
</div>

<!-- TEXT TOOL 1 -->
<div class="box">
<textarea id="input1" placeholder="Nhập văn bản..."></textarea>
<div class="btn-group">
<button onclick="convertText(1)">Chuyển đổi</button>
<button class="copy" onclick="copyText(1)">Copy</button>
</div>
<div id="output1" class="output"></div>
</div>

<!-- TEXT TOOL 2 -->
<div class="box">
<textarea id="input2" placeholder="Nhập văn bản..."></textarea>
<div class="btn-group">
<button onclick="convertText(2)">Chuyển đổi</button>
<button class="copy" onclick="copyText(2)">Copy</button>
</div>
<div id="output2" class="output"></div>
</div>

<!-- TEXT TOOL 3 -->
<div class="box">
<textarea id="input3" placeholder="Nhập văn bản..."></textarea>
<div class="btn-group">
<button onclick="convertText(3)">Chuyển đổi</button>
<button class="copy" onclick="copyText(3)">Copy</button>
</div>
<div id="output3" class="output"></div>
</div>

</div>

<!-- 🔥 TOAST -->
<div id="toast">Đã copy!</div>

<script>
function showToast(msg = "Đã copy!") {
    let toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.opacity = 1;

    setTimeout(() => {
        toast.style.opacity = 0;
    }, 2000);
}

function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

// RANDOM NUMBER
function randomNumber() {
    let length = parseInt(document.getElementById("count").value) || 9;
    let start = document.getElementById("start").value || "1";
    let end = document.getElementById("end").value || "";

    let middleLength = length - start.length - end.length;
    if (middleLength < 0) {
        showToast("Độ dài không hợp lệ!");
        return;
    }

    let middle = "";
    for (let i = 0; i < middleLength; i++) {
        middle += randomInt(0, 9).toString();
    }

    let result = start + middle + end;
    document.getElementById("randomOutput").innerText = result;
}

function copyRandom() {
    let text = document.getElementById("randomOutput").innerText;
    if (!text) return;
    navigator.clipboard.writeText(text);
    showToast();
}

// TEXT TOOL
function randomSuffix() {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let result = "";
    for (let i = 0; i < 4; i++) {
        result += chars[Math.floor(Math.random() * chars.length)];
    }
    return result;
}

function stretchWord(word) {
    if (!word) return word;

    let chars = word.split("");
    let index;
    let rand = Math.random();

    if (rand < 0.7) index = chars.length - 1;
    else if (rand < 0.9) index = 0;
    else index = randomInt(0, chars.length - 1);

    let repeat = randomInt(1, 3);
    chars[index] = chars[index].repeat(repeat + 1);

    return chars.join("");
}

function convertText(id) {
    let text = document.getElementById("input" + id).value.trim();
    if (!text) return;

    let words = text.split(" ");
    let total = words.length;

    let used = [];
    let first = randomInt(0, total - 1);
    used.push(first);

    let probability = 0.5;

    while (Math.random() < probability && used.length < total) {
        let idx;
        do {
            idx = randomInt(0, total - 1);
        } while (used.includes(idx));

        used.push(idx);
        probability /= 2;
    }

    used.forEach(i => {
        words[i] = stretchWord(words[i]);
    });

    let result = words.join(" ") + " " + randomSuffix();
    document.getElementById("output" + id).innerText = result;
}

function copyText(id) {
    let text = document.getElementById("output" + id).innerText;
    if (!text) return;
    navigator.clipboard.writeText(text);
    showToast();
}
</script>

</body>
</html>
